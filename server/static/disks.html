<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e8a940">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NestVault">
<link rel="icon" type="image/png" href="/static/icon_web.png">
<link rel="manifest" href="/static/manifest.json">
<title>Discos — NestVault</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/nav.css">
<script>(function(){const s=localStorage.getItem('nv-theme'),d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s?s==='light':!d)document.documentElement.setAttribute('data-theme','light');window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{if(!localStorage.getItem('nv-theme'))e.matches?document.documentElement.removeAttribute('data-theme'):document.documentElement.setAttribute('data-theme','light');});})();</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:999}

  header{border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:var(--bg);z-index:10}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:28px;height:28px;border:1.5px solid var(--amber);display:grid;place-items:center;color:var(--amber);font-size:14px}
  .logo-text{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase}
  .logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:.08em}
  .header-right{display:flex;align-items:center;gap:20px}
  .hbtn{display:inline-flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border2);color:var(--text-dim);padding:5px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.06em;transition:all .15s;text-decoration:none;user-select:none}
  .hbtn:hover,.hbtn:active{border-color:var(--amber);color:var(--amber)}

  main{padding:28px 32px;max-width:1100px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .page-title{display:flex;align-items:center;gap:10px;margin-bottom:24px;animation:fadeUp .3s ease}
  .page-title-icon{font-size:18px;color:var(--amber)}
  .page-title-text{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)}
  .page-title-sub{font-size:10px;color:var(--text-mute);letter-spacing:.08em;margin-top:2px}

  .error-bar{background:var(--red-dim);border:1px solid var(--red);padding:10px 16px;margin-bottom:20px;color:var(--red);font-size:11px;display:none}
  .error-bar.visible{display:block}

  .disks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

  .disk-card{border:1px solid var(--border);background:var(--bg2);padding:24px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
  .disk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);transform:scaleX(0);transform-origin:left;transition:transform .3s}
  .disk-card:hover::before{transform:scaleX(1)}
  .disk-card.warn::before{background:var(--amber);transform:scaleX(1)}
  .disk-card.crit::before{background:var(--red);transform:scaleX(1)}
  .disk-card.cache::before{background:var(--blue);transform:scaleX(1)}

  .disk-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
  .disk-path{font-size:12px;color:var(--text);word-break:break-all;line-height:1.5;flex:1}
  .disk-badge{display:inline-block;padding:2px 8px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .disk-badge.ok{background:var(--green-dim);color:var(--green)}
  .disk-badge.warn{background:var(--amber-dim);color:var(--amber)}
  .disk-badge.crit{background:var(--red-dim);color:var(--red)}
  .disk-badge.cache{background:var(--blue-dim);color:var(--blue)}

  .disk-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:16px}
  .disk-stat{background:var(--bg3);padding:12px 14px}
  .disk-stat-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
  .disk-stat-value{font-size:17px;font-weight:300;color:var(--amber);letter-spacing:-.02em}
  .disk-stat-value.free{color:var(--green)}
  .disk-stat-value.used{color:var(--blue)}

  .disk-bar-wrap{height:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:8px}
  .disk-bar-fill{height:100%;transition:width .5s ease,background .4s ease}
  .disk-bar-fill.ok{background:var(--green)}
  .disk-bar-fill.warn{background:var(--amber)}
  .disk-bar-fill.crit{background:var(--red)}
  .disk-bar-fill.cache{background:var(--blue)}

  .disk-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-mute);margin-bottom:12px}
  /* Sparkline row */
  .disk-sparkline-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .disk-sparkline-label{font-size:9px;color:var(--text-mute);letter-spacing:.06em}
  .disk-sparkline-label.trend-up{color:var(--red)}
  .disk-sparkline-label.trend-down{color:var(--green)}

  .disk-content-info{border-top:1px solid var(--border);padding-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .disk-ci-item{display:flex;flex-direction:column;gap:4px}
  .disk-ci-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
  .disk-ci-value{font-size:13px;color:var(--text)}

  .loading{padding:40px;text-align:center;color:var(--text-mute);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .loading::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}
  .empty{padding:40px;text-align:center;color:var(--text-mute);font-size:11px}

  /* Login overlay */
  .login-overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .login-box{border:1px solid var(--border2);border-top:2px solid var(--amber);background:var(--bg2);padding:40px 48px;width:min(400px,calc(100vw - 32px));animation:fadeUp .3s ease}
  .login-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .login-sub{font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .login-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:8px}
  .login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;outline:none;transition:border-color .15s}
  .login-input:focus{border-color:var(--amber)}
  .login-btn{margin-top:16px;width:100%;background:var(--amber);border:none;color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:11px;cursor:pointer;transition:opacity .15s;min-height:44px}
  .login-btn:hover{opacity:.85}
  .login-error{margin-top:12px;font-size:11px;color:var(--red);min-height:16px}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2)}

  @media(max-width:768px){
    main{padding:16px}
    header{padding:0 16px}
    .header-right{gap:12px}
    .hbtn{min-height:40px;padding:8px 12px}
    .disks-grid{grid-template-columns:1fr}
    .login-input{font-size:16px}
  }
  @media(max-width:480px){
    main{padding:12px 10px}
    .disk-stats{grid-template-columns:1fr 1fr}
    .login-box{padding:28px 20px}
    .login-btn{min-height:48px}
    .hbtn{min-height:44px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div><div class="logo-text">NestVault</div><div class="logo-sub">Discos</div></div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated" style="font-size:11px;color:var(--text-mute)"></span>
    <button class="hbtn always-visible" id="themeBtn" onclick="toggleTheme()">☀ Claro</button>
    <button class="hbtn" onclick="load()">↻ Refresh</button>
    <a class="hbtn" href="/">← Voltar</a>
    <a class="hbtn" href="/activity">◎ Atividade</a>
    <a class="hbtn" href="/rclone-jobs">⟳ rclone</a>
    <a class="hbtn" href="/stats">∑ Stats</a>
    <button class="hbtn always-visible" id="logoutBtn">⌀ API Key</button>
    <button class="nav-hamburger"></button>
  </div>
</header>

<nav class="mobile-nav">
  <button onclick="load();closeNav()">↻ Refresh</button>
  <a href="/">← Voltar</a>
  <a href="/activity">◎ Atividade</a>
  <a href="/rclone-jobs">⟳ rclone</a>
  <a href="/stats">∑ Stats</a>
</nav>
<div class="mobile-nav-backdrop"></div>

<main>
  <div class="error-bar" id="errorBar"></div>

  <div class="page-title">
    <span class="page-title-icon">⊞</span>
    <div>
      <div class="page-title-text">Gerenciamento de Discos</div>
      <div class="page-title-sub">Espaço e conteúdo por volume de armazenamento</div>
    </div>
  </div>

  <div id="disksContainer"><div class="loading">Carregando</div></div>
</main>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <div class="login-title">◈ NestVault</div>
    <div class="login-sub">Informe a API Key para continuar</div>
    <form id="loginForm">
      <label class="login-label" for="apiKeyInput">API Key</label>
      <input class="login-input" id="apiKeyInput" type="password" placeholder="sua-api-key-aqui" autocomplete="off">
      <button class="login-btn" type="submit">Entrar →</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem('backupApiKey') || '';
  let _lastLoadTime = null;
  let _tickTimer    = null;
  const H = () => ({'X-API-Key': API_KEY});

  function _renderSparkline(hist) {
    if (!hist || hist.length < 2) return '<span class="disk-sparkline-label">sem histórico</span>';
    const pts = hist.map(h => h.pct);
    const max = Math.max(...pts), min = Math.min(...pts);
    const range = max - min || 1;
    const w = 64, h = 16;
    const step = w / (pts.length - 1);
    const points = pts.map((v, i) =>
      (i * step).toFixed(1) + ',' + (h - ((v - min) / range) * h).toFixed(1)
    ).join(' ');
    const trend = pts[pts.length - 1] - pts[0];
    const color = trend > 5 ? 'var(--red)' : trend > 1 ? 'var(--amber)' : 'var(--green)';
    const trendCls = trend > 2 ? 'trend-up' : trend < -2 ? 'trend-down' : '';
    const trendTxt = trend > 0.5 ? '▲ ' + trend.toFixed(1) + '%' : trend < -0.5 ? '▼ ' + Math.abs(trend).toFixed(1) + '%' : '—';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible" title="Tendência de uso (${pts.length} amostras)">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
    </svg><span class="disk-sparkline-label ${trendCls}" style="margin-left:8px">${trendTxt}</span>`;
  }

  function _startTick() {
    clearInterval(_tickTimer);
    _tickTimer = setInterval(function() {
      if (!_lastLoadTime) return;
      const secs = Math.round((Date.now() - _lastLoadTime) / 1000);
      const el = document.getElementById('lastUpdated');
      if (el) el.textContent = 'atualizado há ' + secs + 's';
    }, 1000);
  }

  const fmtSize = b => {
    const u = ['B','KB','MB','GB','TB'];
    for (const unit of u) { if (b < 1024) return b.toFixed(1)+' '+unit; b /= 1024; }
    return b.toFixed(1)+' PB';
  };
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function showError(msg) {
    const b = document.getElementById('errorBar');
    b.textContent = '⚠ '+msg; b.classList.add('visible');
  }
  function clearError() { document.getElementById('errorBar').classList.remove('visible'); }

  function showLogin(msg='') {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('loginError').textContent = msg;
  }
  function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    API_KEY = key; localStorage.setItem('backupApiKey', key);
    hideLogin(); load();
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('backupApiKey'); API_KEY = ''; showLogin();
  });

  async function load() {
    clearError();
    const container = document.getElementById('disksContainer');
    if (!container.querySelector('.disk-card')) container.innerHTML = '<div class="loading">Carregando</div>';
    try {
      const r = await fetch('/storage/disks', {headers: H()});
      if (r.status === 401) { showLogin('API Key inválida.'); container.innerHTML = ''; return; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const disks = await r.json();
      renderDisks(disks);
      _lastLoadTime = Date.now();
      _startTick();
      if (typeof _updateOverflowHints === 'function') _updateOverflowHints();
    } catch(e) {
      showError('Não foi possível conectar: '+e.message);
      container.innerHTML = '<div class="empty">Nenhum dado disponível</div>';
    }
  }

  function renderDisks(disks) {
    const container = document.getElementById('disksContainer');
    if (!disks.length) {
      container.innerHTML = '<div class="empty">Nenhum volume configurado</div>';
      return;
    }

    const cards = disks.map((d, i) => {
      const usedPct = d.total_bytes > 0 ? d.used_bytes / d.total_bytes * 100 : 0;
      const freePct = 100 - usedPct;
      const barCls  = d.is_cache ? 'cache' : (usedPct >= 90 ? 'crit' : usedPct >= 75 ? 'warn' : 'ok');
      const badgeLabel = d.is_cache ? 'Cache SSD' : (usedPct >= 90 ? 'Crítico' : usedPct >= 75 ? 'Atenção' : 'OK');
      const delay = (i * 0.08).toFixed(2);
      const contentLabel = d.is_cache ? 'Arquivos em cache' : 'Arquivos de conteúdo';

      return `
        <div class="disk-card ${d.is_cache ? 'cache' : (barCls !== 'ok' ? barCls : '')}" style="animation-delay:${delay}s">
          <div class="disk-header">
            <div class="disk-path">${esc(d.path)}</div>
            <span class="disk-badge ${barCls}">${badgeLabel}</span>
          </div>

          <div class="disk-stats">
            <div class="disk-stat">
              <div class="disk-stat-label">Total</div>
              <div class="disk-stat-value">${fmtSize(d.total_bytes)}</div>
            </div>
            <div class="disk-stat">
              <div class="disk-stat-label">Usado</div>
              <div class="disk-stat-value used">${fmtSize(d.used_bytes)}</div>
            </div>
            <div class="disk-stat">
              <div class="disk-stat-label">Livre</div>
              <div class="disk-stat-value free">${fmtSize(d.free_bytes)}</div>
            </div>
          </div>

          <div class="disk-bar-wrap">
            <div class="disk-bar-fill ${barCls}" style="width:${usedPct.toFixed(1)}%"></div>
          </div>
          <div class="disk-bar-labels">
            <span>${usedPct.toFixed(1)}% usado</span>
            <span>${freePct.toFixed(1)}% livre</span>
          </div>
          <div class="disk-sparkline-row">
            ${_renderSparkline(d.history)}
          </div>

          <div class="disk-content-info">
            <div class="disk-ci-item">
              <span class="disk-ci-label">${contentLabel}</span>
              <span class="disk-ci-value">${d.content_files.toLocaleString('pt-BR')}</span>
            </div>
            <div class="disk-ci-item">
              <span class="disk-ci-label">Tamanho dos conteúdos</span>
              <span class="disk-ci-value">${fmtSize(d.content_bytes)}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="disks-grid">${cards}</div>`;
  }

  async function init() {
    const resp = await fetch('/health');
    if (!resp.ok) { showError('Servidor indisponível'); return; }
    const test = await fetch('/storage/disks', {headers: H()});
    if (test.status === 401) { showLogin(); }
    else {
      load();
    }
  }
  init();

  function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('nv-theme','dark'); }
    else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('nv-theme','light'); }
    updateThemeBtn();
  }
  function updateThemeBtn() {
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☾ Escuro' : '☀ Claro';
  }
  updateThemeBtn();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
