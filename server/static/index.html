<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e8a940">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NestVault">
<link rel="icon" type="image/svg+xml" href="/static/icon_web.svg">
<link rel="manifest" href="/static/manifest.json">
<title>NestVault</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f0f; --bg2:#131616; --bg3:#1a1e1e;
    --border:#232929; --border2:#2e3636;
    --text:#c8d0ce; --text-dim:#5a6666; --text-mute:#3a4444;
    --amber:#e8a940; --amber-dim:#7a5520;
    --green:#4ecb8d; --green-dim:#1d5a3d;
    --red:#e05c5c; --red-dim:#5a2020;
    --blue:#5ba4cf; --purple:#a78bfa;
    --mono:'IBM Plex Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:999}

  /* Header */
  header{border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:var(--bg);z-index:10}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:28px;height:28px;border:1.5px solid var(--amber);display:grid;place-items:center;color:var(--amber);font-size:14px}
  .logo-text{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase}
  .logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:.08em}
  .header-right{display:flex;align-items:center;gap:20px}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .hbtn{background:none;border:1px solid var(--border2);color:var(--text-dim);padding:5px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.06em;transition:all .15s}
  .hbtn:hover{border-color:var(--amber);color:var(--amber)}
  .last-updated{font-size:11px;color:var(--text-mute)}

  /* Layout */
  main{padding:28px 32px;max-width:1500px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Stats */
  .stats-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;border:1px solid var(--border);margin-bottom:28px;background:var(--border)}
  .stat-box{background:var(--bg2);padding:18px 22px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
  .stat-box:nth-child(1){animation-delay:.05s}.stat-box:nth-child(2){animation-delay:.10s}
  .stat-box:nth-child(3){animation-delay:.15s}.stat-box:nth-child(4){animation-delay:.20s}
  .stat-box:nth-child(5){animation-delay:.25s}.stat-box:nth-child(6){animation-delay:.30s}
  .stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--amber);transform:scaleX(0);transform-origin:left;transition:transform .3s}
  .stat-box:hover::before{transform:scaleX(1)}
  .stat-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
  .stat-value{font-size:26px;font-weight:300;color:var(--amber);letter-spacing:-.02em;line-height:1}
  .stat-sub{font-size:10px;color:var(--text-mute);margin-top:5px;letter-spacing:.04em}
  .disk-bar-wrap{margin-top:10px;height:3px;background:var(--bg3);border:1px solid var(--border)}
  .disk-bar-fill{height:100%;transition:width .4s ease,background .4s ease}
  .disk-bar-fill.ok{background:var(--green)}
  .disk-bar-fill.warn{background:var(--amber)}
  .disk-bar-fill.crit{background:var(--red)}

  /* Error */
  .error-bar{background:var(--red-dim);border:1px solid var(--red);padding:10px 16px;margin-bottom:20px;color:var(--red);font-size:11px;display:none}
  .error-bar.visible{display:block}

  /* Section */
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .section-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}
  .section-title::before{content:'';display:block;width:3px;height:12px;background:var(--amber)}
  .count-badge{background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;font-size:10px;color:var(--text-dim)}

  /* Table */
  .table-wrap{border:1px solid var(--border);margin-bottom:24px;animation:fadeUp .4s .2s ease both;overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--bg3);padding:9px 14px;text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
  thead th:first-child{padding-left:18px}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--bg3)}
  td{padding:11px 14px;vertical-align:middle;font-size:12px}
  td:first-child{padding-left:18px}
  .chevron{color:var(--text-mute);font-size:10px;transition:transform .2s;display:inline-block;margin-right:6px}
  tr.expanded .chevron,.row-version.expanded .chevron{transform:rotate(90deg);color:var(--amber)}
  .num-cell{text-align:right;font-variant-numeric:tabular-nums}
  .size-cell{text-align:right;color:var(--blue);font-variant-numeric:tabular-nums}
  .date-cell{color:var(--text-dim);white-space:nowrap}
  .dim-cell{color:var(--text-dim)}
  .badge{display:inline-block;padding:2px 7px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}
  .badge-active,.badge-done{background:var(--green-dim);color:var(--green)}
  .badge-failed{background:var(--red-dim);color:var(--red)}
  .badge-running{background:var(--amber-dim);color:var(--amber)}

  /* Versions sub-table */
  .versions-row td{padding:0}
  .versions-container{border-top:1px solid var(--border);background:var(--bg2)}
  .versions-head{padding:10px 18px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;justify-content:space-between}
  .versions-inner{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch}
  .row-version{cursor:pointer;transition:background .1s}
  .row-version:hover{background:var(--bg3)}
  .row-version.expanded{background:rgba(232,169,64,.04)}
  .row-version td{padding:9px 18px 9px 36px;font-size:11px;border-bottom:1px solid var(--border)}
  .row-version:last-child td{border-bottom:none}

  /* Files sub-table */
  .files-row td{padding:0}
  .files-container{border-top:1px solid var(--border);background:var(--bg)}
  .files-inner table thead th{background:var(--bg);font-size:9px}
  .files-inner table td{font-size:11px;padding:8px 14px 8px 52px}
  .path-cell{max-width:480px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
  .hash-cell{color:var(--text-mute);font-size:10px}
  .empty{padding:32px;text-align:center;color:var(--text-mute);font-size:11px}
  .loading{padding:40px;text-align:center;color:var(--text-mute);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .loading::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}

  /* Login */
  .login-overlay{position:fixed;inset:0;background:rgba(13,15,15,.93);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .login-box{border:1px solid var(--border2);border-top:2px solid var(--amber);background:var(--bg2);padding:40px 48px;width:min(400px,calc(100vw - 32px));animation:fadeUp .3s ease}
  .login-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .login-sub{font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .login-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:8px}
  .login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;outline:none;transition:border-color .15s}
  .login-input:focus{border-color:var(--amber)}
  .login-btn{margin-top:16px;width:100%;background:var(--amber);border:none;color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:11px;cursor:pointer;transition:opacity .15s}
  .login-btn:hover{opacity:.85}
  .login-error{margin-top:12px;font-size:11px;color:var(--red);min-height:16px}

  /* Compare */
  .cmp-btn{background:none;border:1px solid var(--border2);color:var(--text-dim);padding:3px 10px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:.06em;transition:all .15s;opacity:.4;pointer-events:none}
  .cmp-btn.active{opacity:1;border-color:var(--blue);color:var(--blue);pointer-events:auto}
  .cmp-btn.active:hover{border-color:var(--amber);color:var(--amber)}
  .version-cb{accent-color:var(--amber);cursor:pointer;width:12px;height:12px}
  .diff-row td{padding:0}
  .diff-container{border-top:2px solid var(--blue);background:var(--bg)}
  .diff-head{padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;justify-content:space-between;gap:16px}
  .diff-summary{display:flex;gap:10px;flex-wrap:wrap}
  .diff-tag{padding:2px 8px;font-size:10px;letter-spacing:.06em}
  .diff-tag-add{background:var(--green-dim);color:var(--green)}
  .diff-tag-del{background:var(--red-dim);color:var(--red)}
  .diff-tag-mod{background:var(--amber-dim);color:var(--amber)}
  .diff-tag-unch{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border)}
  .diff-close{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:0 4px;line-height:1}
  .diff-close:hover{color:var(--text)}
  .diff-section{border-bottom:1px solid var(--border)}
  .diff-section:last-child{border-bottom:none}
  .diff-section-title{padding:8px 18px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
  .diff-section-title .chevron{color:var(--text-mute);font-size:10px;transition:transform .2s;display:inline-block}
  .diff-section-title.open .chevron{transform:rotate(90deg);color:var(--amber)}
  .diff-section-body{display:none}
  .diff-section-body.open{display:block}
  .diff-add td:first-child{color:var(--green)}
  .diff-del td:first-child{color:var(--red)}
  .diff-mod td:first-child{color:var(--amber)}
  .delta-pos{color:var(--green)}.delta-neg{color:var(--red)}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2)}

  /* ── Scroll interno nas sub-tabelas ── */
  .files-inner{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .diff-section-body{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* ── Touch targets base ── */
  .hbtn{display:inline-flex;align-items:center;justify-content:center}

  /* ── 768px — tablet/landscape ── */
  @media(max-width:768px){
    .stats-bar{grid-template-columns:repeat(3,1fr)}
    main{padding:16px}
    header{padding:0 16px}
    .header-right{gap:12px}
    .hbtn{min-height:40px;padding:8px 12px}
    tbody tr td{padding:12px 10px}
    tbody tr td:first-child{padding-left:14px}
    .row-version td{padding:11px 14px 11px 28px}
  }

  /* ── 480px — mobile ── */
  @media(max-width:480px){
    .stats-bar{grid-template-columns:repeat(2,1fr)}
    header{height:auto;min-height:56px;flex-wrap:wrap;padding:10px 12px}
    .logo-sub{display:none}
    .header-right{gap:8px;flex-wrap:wrap}
    .last-updated{display:none}
    main{padding:12px 10px}
    .stat-box{padding:14px 12px}
    .stat-value{font-size:20px}
    .hbtn{min-height:44px;font-size:12px}
    .login-box{padding:28px 20px}
    .login-btn{min-height:48px}
    .diff-head{flex-wrap:wrap;gap:8px}
    .cmp-bar{flex-wrap:wrap;gap:8px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div><div class="logo-text">NestVault</div><div class="logo-sub">v3.1</div></div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="hbtn" onclick="loadAll()">↻ Refresh</button>
    <a class="hbtn" href="/disks" style="text-decoration:none">⊞ Discos</a>
    <button class="hbtn" id="logoutBtn">⌀ API Key</button>
  </div>
</header>

<main>
  <div class="error-bar" id="errorBar"></div>

  <div class="stats-bar">
    <div class="stat-box"><div class="stat-label">Backups</div><div class="stat-value" id="sBackups">—</div></div>
    <div class="stat-box"><div class="stat-label">Versões</div><div class="stat-value" id="sVersions">—</div></div>
    <div class="stat-box"><div class="stat-label">Arquivos</div><div class="stat-value" id="sFiles">—</div></div>
    <div class="stat-box"><div class="stat-label">Storage usado</div><div class="stat-value" id="sSize">—</div></div>
    <div class="stat-box">
      <div class="stat-label">Liberável</div>
      <div class="stat-value" id="sReclaimable">—</div>
      <div class="stat-sub">versões antigas</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Disco livre</div>
      <div class="stat-value" id="sDiskFree">—</div>
      <div class="stat-sub" id="sDiskSub">—</div>
      <div class="disk-bar-wrap"><div class="disk-bar-fill ok" id="sDiskBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="section-head">
    <div class="section-title">Backups</div>
    <span class="count-badge" id="backupCount">0</span>
  </div>
  <div class="table-wrap">
    <div id="backupsTable"><div class="loading">Carregando</div></div>
  </div>
</main>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <div class="login-title">◈ NestVault</div>
    <div class="login-sub">Informe a API Key para continuar</div>
    <form id="loginForm">
      <label class="login-label" for="apiKeyInput">API Key</label>
      <input class="login-input" id="apiKeyInput" type="password" placeholder="sua-api-key-aqui" autocomplete="off">
      <button class="login-btn" type="submit">Entrar →</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem('backupApiKey') || '';
  let expandedLabel = null;
  let expandedVersion = {};  // label -> version_key
  let checkedVersions = {};  // label -> Set of version_keys (max 2)

  const H = () => ({'X-API-Key': API_KEY});

  const fmtDuration = s => {
    if (s === null || s === undefined) return '—';
    if (s < 60)    return s.toFixed(0) + 's';
    if (s < 3600)  return (s / 60).toFixed(1) + 'min';
    return (s / 3600).toFixed(1) + 'h';
  };

  const fmtSize = b => {
    const u = ['B','KB','MB','GB','TB'];
    for (const unit of u) { if (b < 1024) return b.toFixed(1)+' '+unit; b /= 1024; }
    return b.toFixed(1)+' PB';
  };
  const fmtDate = s => s ? s.replace('T',' ').slice(0,19) : '—';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const badge = s => `<span class="badge badge-${s}">${s}</span>`;

  function showError(msg) {
    const b = document.getElementById('errorBar');
    b.textContent = '⚠ '+msg; b.classList.add('visible');
  }
  function clearError() { document.getElementById('errorBar').classList.remove('visible'); }

  function showLogin(msg='') {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('loginError').textContent = msg;
  }
  function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    API_KEY = key; localStorage.setItem('backupApiKey', key);
    hideLogin(); loadAll();
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('backupApiKey'); API_KEY = ''; showLogin();
  });

  async function loadAll() {
    clearError();
    try {
      const [respBackups, respDisk] = await Promise.all([
        fetch('/backups', {headers: H()}),
        fetch('/storage/info', {headers: H()}),
      ]);
      if (respBackups.status === 401) { showLogin('API Key inválida.'); return; }
      if (!respBackups.ok) throw new Error(`HTTP ${respBackups.status}`);
      const backups = await respBackups.json();
      const disk = respDisk.ok ? await respDisk.json() : null;

      renderStats(backups, disk);
      renderBackups(backups);
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('pt-BR');
    } catch(e) {
      showError('Não foi possível conectar: '+e.message);
    }
  }

  function renderStats(backups, disk) {
    const totalVersions = backups.reduce((s,b) => s+b.version_count, 0);
    const totalFiles    = backups.reduce((s,b) => s+b.file_count, 0);
    const totalSize     = backups.reduce((s,b) => s+b.total_size_bytes, 0);
    document.getElementById('sBackups').textContent  = backups.length;
    document.getElementById('sVersions').textContent = totalVersions;
    document.getElementById('sFiles').textContent    = totalFiles.toLocaleString('pt-BR');
    document.getElementById('sSize').textContent     = fmtSize(totalSize);
    document.getElementById('backupCount').textContent = backups.length;

    if (disk) {
      const usedPct = disk.total_bytes > 0 ? disk.used_bytes / disk.total_bytes * 100 : 0;
      const freePct = 100 - usedPct;
      const barCls  = usedPct >= 90 ? 'crit' : usedPct >= 80 ? 'warn' : 'ok';
      document.getElementById('sDiskFree').textContent = fmtSize(disk.free_bytes);
      document.getElementById('sDiskSub').textContent  = freePct.toFixed(1) + '% livre · ' + fmtSize(disk.total_bytes) + ' total';
      const bar = document.getElementById('sDiskBar');
      bar.style.width = usedPct.toFixed(1) + '%';
      bar.className = 'disk-bar-fill ' + barCls;
      document.getElementById('sReclaimable').textContent = fmtSize(disk.reclaimable_bytes);
    }
  }

  function renderBackups(backups) {
    const el = document.getElementById('backupsTable');
    if (!backups.length) { el.innerHTML='<div class="empty">Nenhum backup encontrado</div>'; return; }

    const rows = backups.map(b => {
      const isExp = b.label === expandedLabel;
      return `
        <tr class="${isExp?'expanded':''}" onclick="toggleVersions('${esc(b.label)}',this)">
          <td><span class="chevron">▶</span>${esc(b.label)}</td>
          <td class="dim-cell">${esc(b.client_name||'—')}</td>
          <td>${badge('active')}</td>
          <td class="num-cell">${b.version_count}</td>
          <td class="num-cell">${b.file_count.toLocaleString('pt-BR')}</td>
          <td class="size-cell">${fmtSize(b.total_size_bytes)}</td>
          <td class="date-cell">${b.last_version ? fmtDate(b.last_version) : '—'}</td>
        </tr>
        <tr class="versions-row" id="vrow-${esc(b.label)}" style="display:${isExp?'':'none'}">
          <td colspan="7">
            <div class="versions-container">
              <div class="versions-head">
                <span>Versões — ${esc(b.label)}</span>
              </div>
              <div class="versions-inner" id="vinner-${esc(b.label)}">
                <div class="loading">Carregando</div>
              </div>
            </div>
          </td>
        </tr>`;
    }).join('');

    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Label</th><th>Cliente</th><th>Status</th>
          <th style="text-align:right">Versões</th>
          <th style="text-align:right">Arquivos</th>
          <th style="text-align:right">Tamanho</th>
          <th>Última versão</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function toggleVersions(label, row) {
    const vrow = document.getElementById(`vrow-${label}`);
    if (expandedLabel === label) {
      expandedLabel = null;
      row.classList.remove('expanded');
      vrow.style.display = 'none';
      return;
    }
    // Close previous
    if (expandedLabel) {
      const prev = document.getElementById(`vrow-${expandedLabel}`);
      if (prev) prev.style.display = 'none';
      document.querySelectorAll('tbody tr.expanded').forEach(r => r.classList.remove('expanded'));
    }
    expandedLabel = label;
    row.classList.add('expanded');
    vrow.style.display = '';
    document.getElementById(`vinner-${label}`).innerHTML = '<div class="loading">Carregando</div>';
    await loadVersions(label);
  }

  async function loadVersions(label) {
    try {
      const r = await fetch(`/backups/${encodeURIComponent(label)}/versions`, {headers: H()});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const versions = await r.json();
      renderVersions(label, versions);
    } catch(e) {
      document.getElementById(`vinner-${label}`).innerHTML =
        `<div class="empty">Erro: ${e.message}</div>`;
    }
  }

  function renderVersions(label, versions) {
    const el = document.getElementById(`vinner-${label}`);
    if (!versions.length) { el.innerHTML='<div class="empty">Nenhuma versão encontrada</div>'; return; }

    const curVer = expandedVersion[label];
    const curChecked = checkedVersions[label] || new Set();
    const rows = versions.map(v => {
      const isExp = v.version_key === curVer;
      const isChk = curChecked.has(v.version_key);
      const vid = `${label}__${v.version_key}`;
      return `
        <tr class="row-version ${isExp?'expanded':''}"
            onclick="toggleFiles('${esc(label)}','${esc(v.version_key)}',this)">
          <td style="width:28px;padding-left:18px">
            <input type="checkbox" class="version-cb" ${isChk?'checked':''}
              onclick="event.stopPropagation();toggleVersionCheck('${esc(label)}','${esc(v.version_key)}',this)">
          </td>
          <td><span class="chevron">▶</span>${esc(v.version_key)}</td>
          <td>${badge(v.status)}</td>
          <td class="num-cell">${v.file_count}</td>
          <td class="size-cell">${fmtSize(v.total_size_bytes)}</td>
          <td class="num-cell dim-cell">${fmtDuration(v.duration_seconds)}</td>
          <td class="date-cell">${fmtDate(v.created_at)}</td>
        </tr>
        <tr class="files-row" id="frow-${esc(vid)}" style="display:${isExp?'':'none'}">
          <td colspan="8">
            <div class="files-container">
              <div class="files-inner" id="finner-${esc(vid)}">
                <div class="loading">Carregando</div>
              </div>
            </div>
          </td>
        </tr>`;
    }).join('');

    const hasTwoChecked = curChecked.size === 2;
    el.innerHTML = `
      <div class="cmp-bar" style="padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:10px;color:var(--text-mute);letter-spacing:.08em">Selecione 2 versões para comparar</span>
        <button class="cmp-btn ${hasTwoChecked?'active':''}" id="cmpbtn-${esc(label)}"
          onclick="compareVersions('${esc(label)}')">⇄ Comparar selecionadas</button>
      </div>
      <table>
        <thead><tr>
          <th style="width:28px"></th>
          <th>Versão</th><th>Status</th>
          <th style="text-align:right">Arquivos</th>
          <th style="text-align:right">Tamanho</th>
          <th style="text-align:right">Duração</th>
          <th>Criada em</th>
        </tr></thead>
        <tbody>
          ${rows}
          <tr class="diff-row" id="diffrow-${esc(label)}" style="display:none"><td colspan="8"></td></tr>
        </tbody>
      </table>`;

    if (curVer) {
      const vid = `${label}__${curVer}`;
      loadFiles(label, curVer, vid);
    }
  }

  async function toggleFiles(label, version_key, row) {
    const vid = `${label}__${version_key}`;
    const frow = document.getElementById(`frow-${vid}`);
    if (expandedVersion[label] === version_key) {
      expandedVersion[label] = null;
      row.classList.remove('expanded');
      frow.style.display = 'none';
      return;
    }
    // Close previous version in same label
    if (expandedVersion[label]) {
      const prevVid = `${label}__${expandedVersion[label]}`;
      const prev = document.getElementById(`frow-${prevVid}`);
      if (prev) prev.style.display = 'none';
      document.querySelectorAll('.row-version.expanded').forEach(r => r.classList.remove('expanded'));
    }
    expandedVersion[label] = version_key;
    row.classList.add('expanded');
    frow.style.display = '';
    document.getElementById(`finner-${vid}`).innerHTML = '<div class="loading">Carregando</div>';
    await loadFiles(label, version_key, vid);
  }

  async function loadFiles(label, version_key, vid) {
    try {
      const url = `/files?backup_label=${encodeURIComponent(label)}&version_key=${encodeURIComponent(version_key)}`;
      const r = await fetch(url, {headers: H()});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const files = await r.json();
      renderFiles(vid, files);
    } catch(e) {
      document.getElementById(`finner-${vid}`).innerHTML =
        `<div class="empty">Erro: ${e.message}</div>`;
    }
  }

  function renderFiles(vid, files) {
    const el = document.getElementById(`finner-${vid}`);
    if (!files.length) { el.innerHTML='<div class="empty">Nenhum arquivo nesta versão</div>'; return; }
    const rows = files.map(f => `
      <tr>
        <td class="path-cell" title="${esc(f.original_path)}">${esc(f.original_path)}</td>
        <td class="size-cell">${fmtSize(f.size)}</td>
        <td class="hash-cell">${f.sha256.slice(0,16)}…</td>
        <td class="date-cell">${fmtDate(f.created_at)}</td>
      </tr>`).join('');
    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Path original</th>
          <th style="text-align:right">Tamanho</th>
          <th>SHA-256</th>
          <th>Adicionado em</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // -- Compare ----------------------------------------------------------------
  function toggleVersionCheck(label, version_key, cb) {
    if (!checkedVersions[label]) checkedVersions[label] = new Set();
    const set = checkedVersions[label];
    if (cb.checked) {
      if (set.size >= 2) { cb.checked = false; return; }
      set.add(version_key);
    } else {
      set.delete(version_key);
    }
    const btn = document.getElementById(`cmpbtn-${label}`);
    if (btn) btn.classList.toggle('active', set.size === 2);
  }

  async function compareVersions(label) {
    const set = checkedVersions[label];
    if (!set || set.size !== 2) return;
    const [v1, v2] = [...set].sort();
    const diffrow = document.getElementById(`diffrow-${label}`);
    diffrow.style.display = '';
    diffrow.querySelector('td').innerHTML = '<div class="diff-container"><div class="loading">Carregando comparação</div></div>';
    try {
      const url = `/backups/${encodeURIComponent(label)}/compare?v1=${encodeURIComponent(v1)}&v2=${encodeURIComponent(v2)}`;
      const r = await fetch(url, {headers: H()});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      renderComparison(label, data);
    } catch(e) {
      diffrow.querySelector('td').innerHTML =
        `<div class="diff-container"><div class="empty">Erro: ${esc(e.message)}</div></div>`;
    }
  }

  function closeDiff(label) {
    const diffrow = document.getElementById(`diffrow-${label}`);
    if (diffrow) diffrow.style.display = 'none';
  }

  function toggleDiffSection(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
  }

  function renderComparison(label, data) {
    const diffrow = document.getElementById(`diffrow-${label}`);
    const nAdd = data.added.length, nDel = data.deleted.length;
    const nMod = data.modified.length, nUnch = data.summary_unchanged;

    const fileRow = (f, cls) =>
      `<tr class="${cls}"><td class="path-cell" title="${esc(f.original_path)}">${esc(f.original_path)}</td><td class="size-cell">${fmtSize(f.size)}</td><td class="hash-cell">${f.sha256.slice(0,16)}…</td></tr>`;

    const modRow = m => {
      const delta = m.size_delta;
      const dcls = delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : '';
      const dsign = delta > 0 ? '+' : '';
      return `<tr class="diff-mod"><td class="path-cell" title="${esc(m.original_path)}">${esc(m.original_path)}</td><td class="size-cell">${fmtSize(m.v2_size)}</td><td class="${dcls}">${dsign}${fmtSize(Math.abs(delta))}</td><td class="hash-cell">${m.v2_sha256.slice(0,16)}…</td></tr>`;
    };

    const section = (title, tag, rows, cols) => rows.length === 0 ? '' : `
      <div class="diff-section">
        <div class="diff-section-title open" onclick="toggleDiffSection(this)">
          <span class="chevron">▶</span>
          <span class="diff-tag ${tag}">${title}</span>
          <span style="color:var(--text-mute)">${rows.length} arquivo(s)</span>
        </div>
        <div class="diff-section-body open">
          <table><thead><tr>${cols}</tr></thead><tbody>${rows.join('')}</tbody></table>
        </div>
      </div>`;

    const thBase = '<th>Path original</th><th style="text-align:right">Tamanho</th><th>SHA-256</th>';
    const thMod  = '<th>Path original</th><th style="text-align:right">Tamanho novo</th><th>Delta</th><th>SHA-256 novo</th>';

    diffrow.querySelector('td').innerHTML = `
      <div class="diff-container">
        <div class="diff-head">
          <span>⇄ ${esc(data.v1)} → ${esc(data.v2)}</span>
          <div class="diff-summary">
            <span class="diff-tag diff-tag-add">+${nAdd} adicionado${nAdd!==1?'s':''}</span>
            <span class="diff-tag diff-tag-del">−${nDel} removido${nDel!==1?'s':''}</span>
            <span class="diff-tag diff-tag-mod">~${nMod} modificado${nMod!==1?'s':''}</span>
            <span class="diff-tag diff-tag-unch">${nUnch} igual${nUnch!==1?'is':''}</span>
          </div>
          <button class="diff-close" onclick="closeDiff('${esc(label)}')" title="Fechar">✕</button>
        </div>
        ${section('Adicionados','diff-tag-add', data.added.map(f=>fileRow(f,'diff-add')), thBase)}
        ${section('Removidos','diff-tag-del', data.deleted.map(f=>fileRow(f,'diff-del')), thBase)}
        ${section('Modificados','diff-tag-mod', data.modified.map(m=>modRow(m)), thMod)}
        ${nAdd===0&&nDel===0&&nMod===0?'<div class="empty">Versões idênticas — nenhuma diferença encontrada</div>':''}
      </div>`;
  }

  // Init
  async function init() {
    const resp = await fetch('/health');
    if (!resp.ok) { showError('Servidor indisponível'); return; }
    const test = await fetch('/backups', {headers: H()});
    if (test.status === 401) { showLogin(); }
    else { loadAll(); }
  }
  init();
</script>
</body>
</html>
