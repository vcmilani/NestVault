<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e8a940">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NestVault">
<link rel="icon" type="image/png" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<title>NestVault — Explorer</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/app.css">
<link rel="stylesheet" href="/static/nav.css">
<script>(function(){const s=localStorage.getItem('nv-theme'),d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s?s==='light':!d)document.documentElement.setAttribute('data-theme','light');window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{if(!localStorage.getItem('nv-theme'))e.matches?document.documentElement.removeAttribute('data-theme'):document.documentElement.setAttribute('data-theme','light');});})();</script>
<style>
  main{max-width:1500px}

  .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
  .bc-link{color:var(--amber);text-decoration:none}
  .bc-link:hover{text-decoration:underline}
  .bc-sep{color:var(--text-mute)}
  .bc-label{color:var(--text-dim)}
  .bc-version{color:var(--text)}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;border:1px solid var(--border);margin-bottom:20px;background:var(--border);animation:fadeUp .3s ease both}
  .stat-box{background:var(--bg2);padding:14px 18px;position:relative;overflow:hidden}
  .stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--amber);transform:scaleX(0);transform-origin:left;transition:transform .3s}
  .stat-box:hover::before{transform:scaleX(1)}
  .stat-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
  .stat-value{font-size:22px;font-weight:300;color:var(--amber);letter-spacing:-.02em;line-height:1}

  .controls{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-bottom:none;background:var(--bg2)}
  .filter-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 12px;outline:none;transition:border-color .15s;min-width:0}
  .filter-input:focus{border-color:var(--amber)}
  .filter-input::placeholder{color:var(--text-mute)}
  .cbtn{background:none;border:1px solid var(--border2);color:var(--text-dim);padding:5px 10px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:.06em;transition:all .15s;white-space:nowrap;flex-shrink:0;user-select:none;min-height:36px;display:inline-flex;align-items:center;justify-content:center}
  .cbtn:hover,.cbtn:active{border-color:var(--amber);color:var(--amber)}
  .cbtn:disabled{opacity:.35;cursor:not-allowed;border-color:var(--border2) !important;color:var(--text-mute) !important}

  /* Version navigator */
  .ver-nav{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--border);border-top:none;border-bottom:none;background:var(--bg3)}
  .ver-nav.hidden{display:none}
  .ver-label{flex:1;text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ver-label strong{color:var(--text)}

  /* Diff badges */
  .diff-badge{font-size:9px;letter-spacing:.06em;padding:1px 5px;margin-left:5px;flex-shrink:0;vertical-align:middle}
  .diff-add{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green);border:1px solid color-mix(in srgb,var(--green) 30%,transparent)}
  .diff-mod{background:rgba(232,169,64,.12);color:var(--amber);border:1px solid rgba(232,169,64,.25)}
  .diff-del{background:color-mix(in srgb,var(--red) 12%,transparent);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 25%,transparent)}

  /* Folder change dot in tree */
  .t-change-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:4px;display:inline-block}

  /* Diff summary bar */
  .diff-summary{font-size:10px;color:var(--text-mute);display:flex;gap:12px;align-items:center;padding:5px 14px;border-bottom:1px solid var(--border);background:var(--bg3);flex-shrink:0}
  .diff-summary.hidden{display:none}
  .diff-summary span{display:flex;align-items:center;gap:4px}

  /* Two-panel layout */
  .explorer-layout{display:flex;border:1px solid var(--border);animation:fadeUp .35s .05s ease both;height:calc(100vh - 330px);min-height:400px}
  .tree-panel{width:320px;min-width:160px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;overflow-x:auto;background:var(--bg2)}
  .tree-panel .t-count{display:none}
  .files-panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .files-header{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:baseline;gap:12px;flex-shrink:0;min-height:37px}
  .fh-path{font-size:11px;color:var(--amber);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .fh-meta{font-size:10px;color:var(--text-mute);flex-shrink:0;white-space:nowrap}
  .files-list{flex:1;overflow-y:auto;overflow-x:auto}

  /* Tree rows */
  .tree-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:33px;transition:background .1s}
  .tree-row:last-child{border-bottom:none}
  .dir-row{cursor:pointer}
  .dir-row:hover,.dir-row:active{background:var(--bg3)}
  .dir-row.selected{background:rgba(232,169,64,.06);box-shadow:inset 2px 0 0 var(--amber)}
  .dir-row.selected .t-name{color:var(--amber)}
  .file-row{background:var(--bg)}
  .file-row:hover,.file-row:active{background:rgba(91,164,207,.025)}
  .t-chevron{width:16px;flex-shrink:0;text-align:center;font-size:9px;color:var(--text-mute);transition:transform .15s;margin-right:2px}
  .dir-row.open .t-chevron{transform:rotate(90deg);color:var(--amber)}
  .t-icon{font-size:11px;margin-right:6px;flex-shrink:0}
  .dir-row .t-icon{color:var(--amber)}
  .file-row .t-icon{color:var(--text-mute)}
  .t-name{flex:1;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;font-size:12px}
  .dir-row .t-name{color:var(--text)}
  .file-row .t-name{color:var(--text-dim)}
  .t-meta{display:flex;align-items:center;gap:14px;padding-right:14px;flex-shrink:0}
  .t-count{font-size:10px;color:var(--text-mute);min-width:56px;text-align:right}
  .t-size{font-size:11px;color:var(--blue);font-variant-numeric:tabular-nums;min-width:72px;text-align:right}
  .t-hash{font-size:10px;color:var(--text-mute)}
  .t-dl{background:none;border:1px solid transparent;color:var(--text-mute);font-family:var(--mono);font-size:10px;cursor:pointer;padding:2px 7px;transition:all .15s;letter-spacing:.04em;min-height:36px;display:inline-flex;align-items:center;justify-content:center;user-select:none}
  .t-dl:hover,.t-dl:active{border-color:var(--amber);color:var(--amber)}
  .dir-children{display:block}
  .dir-children.collapsed{display:none}

  /* Flat filter list */
  .flat-head{padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
  .flat-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:33px;padding:5px 14px;gap:8px;background:var(--bg);transition:background .1s}
  .flat-row:hover,.flat-row:active{background:rgba(91,164,207,.025)}
  .flat-row:last-child{border-bottom:none}
  .flat-path{flex:1;font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .flat-path em{color:var(--amber);font-style:normal}

  .empty{padding:40px;line-height:1.8}
  .empty a{color:var(--amber)}

  .files-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-mute);font-size:11px;letter-spacing:.06em;gap:10px}
  .files-placeholder-icon{font-size:24px;opacity:.25}

  /* Explorer tabs (mobile only) */
  .explorer-tabs{display:none;border-bottom:1px solid var(--border);background:var(--bg2)}
  .explorer-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px;cursor:pointer;transition:color .15s,border-color .15s;min-height:42px;user-select:none;-webkit-tap-highlight-color:transparent}
  .explorer-tab.active{color:var(--amber);border-bottom-color:var(--amber)}

  @media(max-width:768px){
    .stats-bar{grid-template-columns:repeat(2,1fr)}
    .t-hash{display:none}
    .cbtn{min-height:40px}
    .explorer-tabs{display:flex}
    .explorer-layout{flex-direction:column;height:calc(100vh - 305px);min-height:300px}
    .tree-panel{width:100%;height:100%;max-height:none;border-right:none;border-bottom:none;flex:1}
    .tree-panel.tab-hidden{display:none}
    .files-panel{height:100%;max-height:none;flex:1}
    .files-panel.tab-hidden{display:none}
    .filter-input{font-size:16px}
  }
  @media(max-width:480px){
    .t-count{display:none}
    .cbtn{min-height:44px}
    .explorer-layout{height:calc(100vh - 265px)}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">◈</div>
    <div><div class="logo-text">NestVault</div><div class="logo-sub">Explorer</div></div>
  </div>
  <div class="header-right">
    <button class="hbtn always-visible" id="themeBtn" onclick="toggleTheme()">☀ Claro</button>
    <a class="hbtn" href="/">← Dashboard</a>
    <a class="hbtn" href="/disks">⊞ Discos</a>
    <a class="hbtn" href="/activity">◎ Atividade</a>
    <a class="hbtn" href="/rclone-jobs">⟳ rclone</a>
    <a class="hbtn" href="/stats">∑ Stats</a>
    <a class="hbtn" href="/manage-users">☺ Usuários</a>
    <button class="hbtn always-visible" id="logoutBtn">⌀ API Key</button>
    <button class="nav-hamburger"></button>
  </div>
</header>

<nav class="mobile-nav">
  <a href="/">← Dashboard</a>
  <a href="/disks">⊞ Discos</a>
  <a href="/activity">◎ Atividade</a>
  <a href="/rclone-jobs">⟳ rclone</a>
  <a href="/stats">∑ Stats</a>
  <a href="/manage-users">☺ Usuários</a>
</nav>
<div class="mobile-nav-backdrop"></div>

<main>
  <div class="error-bar" id="errorBar"></div>

  <div class="breadcrumb">
    <a class="bc-link" href="/">NestVault</a>
    <span class="bc-sep">/</span>
    <span class="bc-label" id="bcLabel">—</span>
    <span class="bc-sep">/</span>
    <span class="bc-version" id="bcVersion">—</span>
  </div>

  <div class="stats-bar">
    <div class="stat-box"><div class="stat-label">Arquivos</div><div class="stat-value" id="sFiles">—</div></div>
    <div class="stat-box"><div class="stat-label">Pastas</div><div class="stat-value" id="sDirs">—</div></div>
    <div class="stat-box"><div class="stat-label">Tamanho total</div><div class="stat-value" id="sSize">—</div></div>
    <div class="stat-box"><div class="stat-label">Profundidade</div><div class="stat-value" id="sDepth">—</div></div>
  </div>

  <div class="controls">
    <input class="filter-input" id="filterInput" type="text" placeholder="Filtrar arquivos por nome ou caminho…" oninput="onFilterDebounced(this.value)">
    <button class="cbtn" onclick="expandAll()">⊞ Expandir</button>
    <button class="cbtn" onclick="collapseAll()">⊟ Colapsar</button>
  </div>

  <div class="ver-nav hidden" id="verNav">
    <button class="cbtn" id="verPrev" onclick="navigateVersion(-1)">← Anterior</button>
    <span class="ver-label" id="verLabel"></span>
    <button class="cbtn" id="verNext" onclick="navigateVersion(+1)">Próxima →</button>
  </div>

  <div class="explorer-tabs" id="explorerTabs">
    <button class="explorer-tab active" id="tabTree" onclick="switchTab('tree')">📁 Pastas</button>
    <button class="explorer-tab" id="tabFiles" onclick="switchTab('files')">📄 Arquivos</button>
  </div>

  <div class="explorer-layout">
    <div class="tree-panel" id="dirTree">
      <div class="loading">Carregando</div>
    </div>
    <div class="files-panel tab-hidden" id="filesPanel">
      <div class="diff-summary hidden" id="diffSummary"></div>
      <div class="files-header" id="filesHeader"></div>
      <div class="files-list" id="filesList">
        <div class="files-placeholder">
          <span class="files-placeholder-icon">▸</span>
          Selecione uma pasta
        </div>
      </div>
    </div>
  </div>
</main>

<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <div class="login-title">◈ NestVault</div>
    <div class="login-sub">Informe a API Key para continuar</div>
    <form id="loginForm">
      <label class="login-label" for="apiKeyInput">API Key</label>
      <input class="login-input" id="apiKeyInput" type="password" placeholder="sua-api-key-aqui" autocomplete="off">
      <button class="login-btn" type="submit">Entrar →</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
  const qp    = new URLSearchParams(location.search);
  const LABEL = qp.get('label') || '';
  let currentVersion = qp.get('version') || '';

  let allFiles      = [];
  let treeRoot      = null;
  let nodeMap       = new Map();
  let selectedPath  = null;
  let _nodeId       = 0;

  let allVersions   = [];
  let currentVerIdx = -1;
  let compareData   = null;  // { added: Map<normPath,entry>, deleted: Map, modified: Map }
  let folderChanges = null;  // Map<folderPath, {add,mod,del}>

  const normPath = p => p.replace(/\\/g, '/').replace(/^\//, '');
  const basename = p => p.replace(/\\/g,'/').split('/').filter(Boolean).pop() || p;

  // -- Tree building ----------------------------------------------------------
  function buildTree(files) {
    const root = { type:'dir', name:'', path:'', children: new Map(), files:[] };
    nodeMap.clear();
    nodeMap.set('', root);
    for (const f of files) {
      const norm  = f.original_path.replace(/\\/g, '/').replace(/^\//, '');
      const parts = norm.split('/').filter(Boolean);
      let node = root;
      const bn = parts.length ? parts[parts.length - 1] : f.original_path;
      for (let i = 0; i < parts.length - 1; i++) {
        const part = parts[i];
        if (!node.children.has(part)) {
          const childPath = node.path ? node.path + '/' + part : part;
          const child = { type:'dir', name:part, path:childPath, children: new Map(), files:[] };
          node.children.set(part, child);
          nodeMap.set(childPath, child);
        }
        node = node.children.get(part);
      }
      node.files.push({ ...f, _basename: bn });
    }
    return root;
  }

  function computeStats(node) {
    let count = node.files.length;
    let size  = node.files.reduce((s, f) => s + (f.size || 0), 0);
    let dirs  = node.children.size;
    let depth = 0;
    for (const child of node.children.values()) {
      const cs = computeStats(child);
      count += cs.count;
      size  += cs.size;
      dirs  += cs.dirs;
      depth  = Math.max(depth, cs.depth + 1);
      child._stats = cs;
    }
    node._stats = { count, size, dirs, depth };
    return { count, size, dirs, depth };
  }

  // -- Left panel: dir tree ---------------------------------------------------
  function _changeDot(path) {
    const fc = folderChanges?.get(path);
    if (!fc) return '';
    if (fc.add) return `<span class="t-change-dot" style="background:var(--green)" title="${fc.add} adicionado(s)"></span>`;
    if (fc.mod) return `<span class="t-change-dot" style="background:var(--amber)" title="${fc.mod} modificado(s)"></span>`;
    if (fc.del) return `<span class="t-change-dot" style="background:var(--red)" title="${fc.del} removido(s)"></span>`;
    return '';
  }

  function renderDirTree(node, depth) {
    let html = '';
    const pad = depth * 18;
    const sortedDirs = [...node.children.entries()]
      .sort(([a], [b]) => a.localeCompare(b, 'pt', { sensitivity:'base' }));
    for (const [name, child] of sortedDirs) {
      const id  = `dn${_nodeId++}`;
      const st  = child._stats || { count:0, size:0 };
      const sel = selectedPath === child.path ? ' selected' : '';
      html += `
<div class="tree-row dir-row open${sel}" data-path="${esc(child.path)}" data-child-id="${id}">
  <span style="display:inline-block;width:${pad}px;flex-shrink:0"></span>
  <span class="t-chevron">▶</span>
  <span class="t-icon">▸</span>
  <span class="t-name">${esc(name)}/</span>
  <div class="t-meta">
    ${_changeDot(child.path)}
    <span class="t-count">${st.count} arq.</span>
    <span class="t-size">${fmtSize(st.size)}</span>
  </div>
</div>
<div id="${id}" class="dir-children">${renderDirTree(child, depth + 1)}</div>`;
    }
    return html;
  }

  function _renderDirTree() {
    _nodeId = 0;
    const st  = treeRoot._stats || { count:0, size:0 };
    const sel = selectedPath === '' ? ' selected' : '';
    document.getElementById('dirTree').innerHTML = `
<div class="tree-row dir-row open${sel}" data-path="" data-child-id="rootChildren">
  <span class="t-chevron">▶</span>
  <span class="t-icon">◈</span>
  <span class="t-name" style="letter-spacing:.04em">raiz/</span>
  <div class="t-meta">
    ${_changeDot('')}
    <span class="t-count">${st.count} arq.</span>
    <span class="t-size">${fmtSize(st.size)}</span>
  </div>
</div>
<div id="rootChildren" class="dir-children">${renderDirTree(treeRoot, 0)}</div>`;
  }

  // -- Dir click (event delegation) ------------------------------------------
  document.addEventListener('click', e => {
    const row = e.target.closest('.dir-row');
    if (!row) return;
    const childId = row.dataset.childId;
    if (childId) {
      const children = document.getElementById(childId);
      if (children) {
        if (row.classList.toggle('open')) {
          children.classList.remove('collapsed');
        } else {
          children.classList.add('collapsed');
        }
      }
    }
    const path = row.dataset.path;
    if (path !== undefined) selectDir(path);
  });

  function selectDir(path) {
    selectedPath = path;
    document.querySelectorAll('#dirTree .dir-row.selected')
      .forEach(el => el.classList.remove('selected'));
    for (const row of document.querySelectorAll('#dirTree .dir-row')) {
      if (row.dataset.path === path) { row.classList.add('selected'); break; }
    }
    const q = document.getElementById('filterInput').value.trim();
    if (!q) {
      const node = nodeMap.get(path);
      if (node) renderFileList(node);
    }
    if (window.innerWidth <= 768) switchTab('files');
  }

  function expandAll() {
    document.querySelectorAll('#dirTree .dir-row').forEach(el => el.classList.add('open'));
    document.querySelectorAll('#dirTree .dir-children').forEach(el => el.classList.remove('collapsed'));
  }
  function collapseAll() {
    document.querySelectorAll('#dirTree .dir-row:not([data-path=""])').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('#dirTree .dir-children:not(#rootChildren)').forEach(el => el.classList.add('collapsed'));
  }

  // -- Right panel: file list -------------------------------------------------
  function renderFileList(node) {
    const header = document.getElementById('filesHeader');
    const list   = document.getElementById('filesList');
    const pathDisplay = node.path ? node.path + '/' : 'raiz/';
    const directFiles = [...node.files].sort((a,b) =>
      a._basename.localeCompare(b._basename, 'pt', { sensitivity:'base' }));

    // Files deleted in this folder relative to previous version
    const deletedInFolder = compareData
      ? [...compareData.deleted.values()].filter(f => {
          const fp  = normPath(f.original_path);
          const sep = fp.lastIndexOf('/');
          const dir = sep >= 0 ? fp.slice(0, sep) : '';
          return dir === node.path;
        })
      : [];

    let metaStr = `${directFiles.length} arq.`;
    if (deletedInFolder.length) metaStr += ` · ${deletedInFolder.length} removido(s)`;
    metaStr += ` · ${node.children.size} subpasta(s)`;
    header.innerHTML =
      `<span class="fh-path">${esc(pathDisplay)}</span>` +
      `<span class="fh-meta">${metaStr}</span>`;

    if (!directFiles.length && !deletedInFolder.length) {
      list.innerHTML = '<div class="empty">Nenhum arquivo direto nesta pasta</div>';
      return;
    }

    const fileRows = directFiles.map(f => {
      const key   = normPath(f.original_path);
      const badge = !compareData ? '' :
        compareData.added.has(key)    ? '<span class="diff-badge diff-add">+ novo</span>' :
        compareData.modified.has(key) ? '<span class="diff-badge diff-mod">~ mod</span>' : '';
      return `
<div class="tree-row file-row">
  <span class="t-chevron" style="visibility:hidden">▶</span>
  <span class="t-icon">·</span>
  <span class="t-name" title="${esc(f.original_path)}">${esc(f._basename)}</span>
  <div class="t-meta">
    ${badge}
    <span class="t-hash">${f.sha256 ? f.sha256.slice(0,10)+'…' : '—'}</span>
    <span class="t-size">${fmtSize(f.size || 0)}</span>
    <button class="t-dl" data-id="${f.id}" data-name="${esc(f._basename)}" onclick="dlFile(+this.dataset.id,this.dataset.name)" title="Baixar arquivo">↓ baixar</button>
  </div>
</div>`;
    });

    const deletedRows = deletedInFolder.map(f => {
      const bn = basename(f.original_path);
      return `
<div class="tree-row file-row" style="opacity:.55">
  <span class="t-chevron" style="visibility:hidden">▶</span>
  <span class="t-icon" style="color:var(--red)">·</span>
  <span class="t-name" style="text-decoration:line-through;color:var(--text-mute)" title="${esc(f.original_path)}">${esc(bn)}</span>
  <div class="t-meta">
    <span class="diff-badge diff-del">− removido</span>
    <span class="t-size">${fmtSize(f.size || 0)}</span>
  </div>
</div>`;
    });

    list.innerHTML = [...fileRows, ...deletedRows].join('');
  }

  // -- Filter -----------------------------------------------------------------
  let _filterTimer = null;
  function onFilterDebounced(value) {
    clearTimeout(_filterTimer);
    _filterTimer = setTimeout(() => onFilter(value), 250);
  }

  function onFilter(q) {
    q = q.trim();
    const header = document.getElementById('filesHeader');
    const list   = document.getElementById('filesList');
    if (!q) {
      if (selectedPath !== null) {
        const node = nodeMap.get(selectedPath);
        if (node) { renderFileList(node); return; }
      }
      header.innerHTML = '';
      list.innerHTML = '<div class="files-placeholder"><span class="files-placeholder-icon">▸</span>Selecione uma pasta</div>';
      return;
    }
    const ql      = q.toLowerCase();
    const matched = allFiles.filter(f => f.original_path.toLowerCase().includes(ql));
    header.innerHTML =
      `<span class="fh-path">busca: &quot;${esc(q)}&quot;</span>` +
      `<span class="fh-meta">${matched.length} resultado(s)</span>`;
    if (!matched.length) {
      list.innerHTML = `<div class="empty">Nenhum arquivo encontrado para "<strong>${esc(q)}</strong>"</div>`;
      return;
    }
    const re   = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    list.innerHTML = matched.map(f => {
      const escaped     = esc(f.original_path);
      const highlighted = escaped.replace(re, m => `<em>${m}</em>`);
      return `
<div class="flat-row">
  <span class="t-icon" style="color:var(--text-mute);flex-shrink:0">·</span>
  <span class="flat-path" title="${esc(f.original_path)}">${highlighted}</span>
  <div class="t-meta">
    <span class="t-hash">${f.sha256 ? f.sha256.slice(0,10)+'…' : '—'}</span>
    <span class="t-size">${fmtSize(f.size || 0)}</span>
    <button class="t-dl" data-id="${f.id}" data-name="${esc(basename(f.original_path))}" onclick="dlFile(+this.dataset.id,this.dataset.name)" title="Baixar arquivo">↓ baixar</button>
  </div>
</div>`;
    }).join('');
  }

  // -- Download ---------------------------------------------------------------
  async function dlFile(fileId, filename) {
    try {
      const r = await fetch(`/files/${fileId}/download`, { headers: H() });
      if (r.status === 401) { showLogin(); return; }
      if (r.status === 403) { showLogin('Esta chave não tem permissão de administrador.'); return; }
      if (!r.ok) { showError(`Erro ${r.status} ao baixar o arquivo`); return; }
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) {
      showError('Erro ao baixar: ' + e.message);
    }
  }

  // -- Version navigation -----------------------------------------------------
  async function loadVersionList() {
    if (!LABEL) return;
    try {
      const r = await fetch(`/backups/${encodeURIComponent(LABEL)}/versions`, { headers: H() });
      if (!r.ok) return;
      allVersions = (await r.json()).sort((a, b) =>
        a.version_key < b.version_key ? -1 : 1);
      currentVerIdx = allVersions.findIndex(v => v.version_key === currentVersion);
      renderVerNav();
    } catch(e) { /* non-critical */ }
  }

  function renderVerNav() {
    const nav = document.getElementById('verNav');
    if (allVersions.length <= 1) { nav.classList.add('hidden'); return; }
    nav.classList.remove('hidden');
    const v     = allVersions[currentVerIdx];
    const label = v
      ? `<strong>${esc(v.version_key.slice(0,19).replace('T',' '))}</strong> · ${currentVerIdx + 1}/${allVersions.length}`
      : '—';
    document.getElementById('verLabel').innerHTML = label;
    document.getElementById('verPrev').disabled = currentVerIdx <= 0;
    document.getElementById('verNext').disabled = currentVerIdx >= allVersions.length - 1;
  }

  async function navigateVersion(delta) {
    const newIdx = currentVerIdx + delta;
    if (newIdx < 0 || newIdx >= allVersions.length) return;
    // Disable buttons during load to prevent double-clicks
    document.getElementById('verPrev').disabled = true;
    document.getElementById('verNext').disabled = true;
    const newVer    = allVersions[newIdx].version_key;
    const prevVer   = newIdx > 0 ? allVersions[newIdx - 1].version_key : null;
    const savedPath = selectedPath;
    currentVerIdx   = newIdx;
    currentVersion  = newVer;
    // Update URL without reload
    const url = new URL(location.href);
    url.searchParams.set('version', newVer);
    history.pushState({}, '', url);
    // Clear filter input
    document.getElementById('filterInput').value = '';
    const ok = await loadFilesData(newVer);
    if (!ok) { renderVerNav(); return; }
    if (prevVer) {
      await fetchCompare(prevVer, newVer);
    } else {
      compareData = null; folderChanges = null;
      document.getElementById('diffSummary').classList.add('hidden');
    }
    _renderDirTree();
    // Restore folder selection if it still exists in the new version
    const restoredNode = savedPath !== null ? nodeMap.get(savedPath) : null;
    if (restoredNode) {
      selectDir(savedPath);
    } else {
      selectedPath = '';
      renderFileList(treeRoot);
    }
    renderVerNav();
  }

  async function fetchCompare(v1, v2) {
    try {
      const r = await fetch(
        `/backups/${encodeURIComponent(LABEL)}/compare?v1=${encodeURIComponent(v1)}&v2=${encodeURIComponent(v2)}`,
        { headers: H() }
      );
      if (!r.ok) { compareData = null; folderChanges = null; return; }
      const data = await r.json();
      compareData = {
        added:    new Map(data.added.map(f    => [normPath(f.original_path), f])),
        deleted:  new Map(data.deleted.map(f  => [normPath(f.original_path), f])),
        modified: new Map(data.modified.map(f => [normPath(f.original_path), f])),
      };
      folderChanges = buildFolderChanges(data);
      updateDiffSummary(data);
    } catch(e) { compareData = null; folderChanges = null; }
  }

  function buildFolderChanges(data) {
    const m = new Map();
    function mark(filePath, type) {
      const parts = normPath(filePath).split('/');
      if (!m.has('')) m.set('', { add:0, mod:0, del:0 });
      m.get('')[type]++;
      for (let i = 1; i < parts.length; i++) {
        const fp = parts.slice(0, i).join('/');
        if (!m.has(fp)) m.set(fp, { add:0, mod:0, del:0 });
        m.get(fp)[type]++;
      }
    }
    data.added.forEach(f    => mark(f.original_path, 'add'));
    data.deleted.forEach(f  => mark(f.original_path, 'del'));
    data.modified.forEach(f => mark(f.original_path, 'mod'));
    return m;
  }

  function updateDiffSummary(data) {
    const el = document.getElementById('diffSummary');
    if (!data || (!data.added.length && !data.deleted.length && !data.modified.length)) {
      el.classList.add('hidden'); return;
    }
    el.classList.remove('hidden');
    el.innerHTML =
      `<span><span class="diff-badge diff-add">+${data.added.length}</span> adicionados</span>` +
      `<span><span class="diff-badge diff-mod">~${data.modified.length}</span> modificados</span>` +
      `<span><span class="diff-badge diff-del">-${data.deleted.length}</span> removidos</span>` +
      `<span style="margin-left:auto">${data.summary_unchanged} inalterados</span>`;
  }

  // -- Load -------------------------------------------------------------------
  async function loadFilesData(versionKey) {
    const dirTree     = document.getElementById('dirTree');
    const filesHeader = document.getElementById('filesHeader');
    const filesList   = document.getElementById('filesList');

    if (!LABEL || !versionKey) {
      dirTree.innerHTML   = '';
      filesHeader.innerHTML = '';
      filesList.innerHTML = `<div class="empty">Nenhuma versão selecionada.<br><a href="/">← Voltar ao dashboard</a></div>`;
      return false;
    }

    document.getElementById('bcLabel').textContent   = LABEL;
    document.getElementById('bcVersion').textContent = versionKey;
    document.title = `NestVault — ${LABEL} / ${versionKey}`;
    dirTree.innerHTML   = '<div class="loading">Carregando</div>';
    filesHeader.innerHTML = '';
    filesList.innerHTML = '';

    try {
      const url = `/files?backup_label=${encodeURIComponent(LABEL)}&version_key=${encodeURIComponent(versionKey)}`;
      const r   = await fetch(url, { headers: H() });
      if (r.status === 401) { showLogin(); return false; }
      if (r.status === 403) { showLogin('Esta chave não tem permissão de administrador.'); return false; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      allFiles = await r.json();

      if (!allFiles.length) {
        dirTree.innerHTML   = '';
        filesHeader.innerHTML = '';
        filesList.innerHTML = '<div class="empty">Nenhum arquivo nesta versão</div>';
        ['sFiles','sDirs','sSize','sDepth'].forEach(id =>
          document.getElementById(id).textContent = '0');
        return false;
      }

      treeRoot    = buildTree(allFiles);
      const stats = computeStats(treeRoot);

      document.getElementById('sFiles').textContent = stats.count.toLocaleString('pt-BR');
      document.getElementById('sDirs').textContent  = stats.dirs.toLocaleString('pt-BR');
      document.getElementById('sSize').textContent  = fmtSize(stats.size);
      document.getElementById('sDepth').textContent = stats.depth;

      return true;
    } catch(e) {
      dirTree.innerHTML   = `<div class="empty">Erro ao carregar: ${esc(e.message)}</div>`;
      filesHeader.innerHTML = '';
      filesList.innerHTML = '';
      showError('Não foi possível carregar: ' + e.message);
      return false;
    }
  }

  async function loadFiles() {
    compareData = null; folderChanges = null;
    document.getElementById('diffSummary').classList.add('hidden');
    const ok = await loadFilesData(currentVersion);
    if (ok) {
      selectedPath = '';
      _renderDirTree();
      renderFileList(treeRoot);
    }
  }

  // -- Init — a própria carga inicial faz o auth-check (401 → login) ---------
  (async function init() {
    await loadFiles();
    await loadVersionList();
  })();

  // -- Browser back/forward ---------------------------------------------------
  window.addEventListener('popstate', () => {
    const qp2 = new URLSearchParams(location.search);
    const v   = qp2.get('version') || '';
    if (v && v !== currentVersion) {
      currentVersion  = v;
      currentVerIdx   = allVersions.findIndex(v2 => v2.version_key === v);
      compareData     = null;
      folderChanges   = null;
      document.getElementById('diffSummary').classList.add('hidden');
      loadFilesData(v).then(ok => {
        if (!ok) return;
        selectedPath = '';
        _renderDirTree();
        renderFileList(treeRoot);
        renderVerNav();
      });
    }
  });

  function switchTab(tab) {
    const tree = document.getElementById('dirTree');
    const files = document.getElementById('filesPanel');
    const tabTree = document.getElementById('tabTree');
    const tabFiles = document.getElementById('tabFiles');
    if (tab === 'tree') {
      tree.classList.remove('tab-hidden');
      files.classList.add('tab-hidden');
      tabTree.classList.add('active');
      tabFiles.classList.remove('active');
    } else {
      files.classList.remove('tab-hidden');
      tree.classList.add('tab-hidden');
      tabFiles.classList.add('active');
      tabTree.classList.remove('active');
    }
  }
</script>
<script src="/static/nav.js"></script>
</body>
